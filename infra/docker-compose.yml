services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zbvaka
      POSTGRES_USER: zbvaka
      POSTGRES_PASSWORD: zbvaka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zbvaka -d zbvaka"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: python:3.12-slim
    working_dir: /workspace
    env_file:
      - ./api.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../apps/api:/workspace
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10m
    command: >
      sh -c "pip install --no-cache-dir --default-timeout=1000 -e . &&
      alembic upgrade head &&
      python -c 'from app.db.session import SessionLocal; from app.services.seed import seed_database; db=SessionLocal(); seed_database(db); db.close()' &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    image: node:22-bookworm-slim
    env_file:
      - ./web.env.example
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ..:/workspace
      - web_node_modules:/workspace/node_modules
    working_dir: /workspace
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 10m
    command: >
      sh -c "npm install &&
      npm --workspace @zb-vaka/web run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  web_node_modules:
